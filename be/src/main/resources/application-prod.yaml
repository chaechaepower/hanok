spring:
  datasource:
    hikari:
      maximum-pool-size: 50    # 10 → 50
      minimum-idle: 10
      connection-timeout: 3000  # 3초 대기 후 에러
      idle-timeout: 60000
      max-lifetime: 1800000
  config:
    activate:
      on-profile: prod

  cloud:
    gcp:
      storage:
        credentials:
          location: file:${GCS_CREDENTIALS_PATH}

  jpa:
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1

logging:
  level:
    com.ssafy.be: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql: WARN

server:
  tomcat:
    mbeanregistry:
      enabled: true

    threads:
      max: 500
      min-spare: 50

    max-connections: 10000
    accept-count: 1000

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    prometheus:
      access: unrestricted
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      application: hanok-backend
      namespace: production
    lettuce:
      enabled: true