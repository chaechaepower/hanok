spring:
  config:
    activate:
      on-profile: prod

  cloud:
    gcp:
      storage:
        credentials:
          location: file:${GCS_CREDENTIALS_PATH}

  jpa:
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1

logging:
  level:
    com.ssafy.be: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql: WARN

server:
  tomcat:
    mbeanregistry:
      enabled: true
    max-connections: 1000
  threads:
    max: 500
    min-spare: 50

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    prometheus:
      access: unrestricted
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      application: hanok-backend
      namespace: production