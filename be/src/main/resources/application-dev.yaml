spring:
  config:
    activate:
      on-profile: dev

  jpa:
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true   # 기존 테이블이 있을 때 충돌 방지
    baseline-version: 1         # V1부터 베이스라인 지정

  autoconfigure:
    exclude:
      - com.google.cloud.spring.autoconfigure.secretmanager.GcpSecretManagerAutoConfiguration

logging:
  level:
    com.ssafy.be: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE

server:
  port: 8081