spring:
  application:
    name: be

  jackson:
    time-zone: Asia/Seoul
    serialization:
      write-dates-as-timestamps: false

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
    disable-swagger-default-url: true   # ← 추가
  api-docs:
    path: /v3/api-docs
  packages-to-scan: com.ssafy.be        # ← 추가
  default-consumes-media-type: application/json
  default-produces-media-type: application/json

server:
  port: 8080