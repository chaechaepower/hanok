spring:
  application:
    name: be

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:}:${DB_PORT:}/${DB_NAME:}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  #      password: ${REDIS_PASSWORD:}
  #      ssl:
  #        enabled: ${REDIS_SSL_ENABLED:false}

  jackson:
    time-zone: Asia/Seoul
    serialization:
      write-dates-as-timestamps: false

jwt:
  secret: ${JWT_SECRET:}
  expiration: ${JWT_EXPIRATION:}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:}

was:
  cors-allow-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
    disable-swagger-default-url: true
  api-docs:
    path: /v3/api-docs
  packages-to-scan: com.ssafy.be
  default-consumes-media-type: application/json
  default-produces-media-type: application/json

portone:
  base-url: ${PORTONE_BASE_URL:}
  store-id: ${PORTONE_STORE_ID:}
  secret:
      key: ${PORTONE_SECRET_KEY:}
      webhook: ${PORTONE_SECRET_WEBHOOK:} # 추후 운영 서버 도메인으로 웹훅 재등록 필요
