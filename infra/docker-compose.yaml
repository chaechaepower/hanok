# =============================================
# ★ Backend 공통 템플릿 정의 (x- 접두사 사용)
# =============================================
x-backend-common: &backend-template
  image: kimkangyeon/hanok-backend:prod
  restart: unless-stopped
  volumes:
    - /var/lib/docker/volumes/jenkins-stack_jenkins_home/_data/env/gcs-key.json:/app/gcs-key.json
  networks:
    - hanok-network
  environment:
    TZ: Asia/Seoul
    SPRING_PROFILES_ACTIVE: prod
    DB_HOST: hanok-mysql
    DB_PORT: 3306
    DB_NAME: ${DB_NAME}
    DB_USERNAME: ${DB_USERNAME}
    DB_PASSWORD: ${DB_PASSWORD}
    JWT_SECRET: ${JWT_SECRET}
    JWT_EXPIRATION: ${JWT_EXPIRATION}
    JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION}
    PORTONE_BASE_URL: ${PORTONE_BASE_URL}
    PORTONE_STORE_ID: ${PORTONE_STORE_ID}
    PORTONE_SECRET_KEY: ${PORTONE_SECRET_KEY}
    PORTONE_SECRET_WEBHOOK: ${PORTONE_SECRET_WEBHOOK}
    CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    REDIS_HOST: redis
    REDIS_PORT: 6379
    GCS_CREDENTIALS_PATH: ${GCS_CREDENTIALS_PATH}
    GOOGLE_APPLICATION_CREDENTIALS: /app/gcs-key.json
    BIZNO_API_KEY: ${BIZNO_API_KEY}
    BLOCKCHAIN_RPC_URL: ${BLOCKCHAIN_RPC_URL}
    SERVER_WALLET_PRIVATE_KEY: ${SERVER_WALLET_PRIVATE_KEY}
    CONTRACT_ADDRESS: ${CONTRACT_ADDRESS}

services:
  nginx:
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    image: nginx:latest
    container_name: hanok-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - /var/lib/docker/volumes/jenkins-stack_jenkins_home/_data/workspace/hanok/infra/nginx/conf.d:/etc/nginx/conf.d
      - /var/www/hanok:/var/www/hanok
      - /etc/letsencrypt:/etc/letsencrypt
    restart: always
    networks:
      - hanok-network # 백엔드와 같은 네트워크 사용
  # =============================================
  # MySQL
  # =============================================
  mysql:
    image: mysql:8.0.45
    container_name: hanok-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      TZ: Asia/Seoul
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - hanok-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =============================================
  # Redis
  # =============================================
  redis:
    image: redis:7-alpine
    container_name: hanok-redis
    restart: unless-stopped
    command: redis-server --notify-keyspace-events Ex
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - hanok-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =============================================
  # Backend (prod)
  # =============================================
  backend-prod:
    <<: *backend-template  # ★ 위에 정의한 공통 템플릿(환경변수, 볼륨 등)을 싹 가져옵니다!
    container_name: hanok-backend-prod
    ports:
      - "8080:8080"

  # =============================================
  # Backend (green)
  # =============================================
  backend-green:
    <<: *backend-template  # ★ 여기서도 템플릿 가져오기! 포트와 이름만 다르게 설정합니다.
    container_name: hanok-backend-green
    ports:
      - "8081:8080"

  # =============================================
  # LiveKit
  # =============================================
  livekit:
    image: livekit/livekit-server:latest
    container_name: hanok-livekit
    restart: unless-stopped
    ports:
      - "7880:7880"
    volumes:
      - /var/lib/docker/volumes/jenkins-stack_jenkins_home/_data/workspace/hanok/infra/livekit.yaml:/livekit.yaml
    command: --config /livekit.yaml
    networks:
      - hanok-network

  # =============================================
  # Prometheus
  # =============================================
  prometheus:
    image: prom/prometheus:latest
    container_name: hanok-prometheus
    restart: unless-stopped
    ports:
      - "9091:9090"
    volumes:
      - /var/lib/docker/volumes/jenkins-stack_jenkins_home/_data/workspace/hanok/infra/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      - hanok-network

  # =============================================
  # Grafana
  # =============================================
  grafana:
    image: grafana/grafana:latest
    container_name: hanok-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - hanok-network

  # =============================================
  # Loki (로그 수집 서버)
  # =============================================
  loki:
    image: grafana/loki:latest
    container_name: hanok-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - loki-data:/loki
    networks:
      - hanok-network

  # =============================================
  # Promtail (로그 수집 에이전트)
  # =============================================
  promtail:
    image: grafana/promtail:latest
    container_name: hanok-promtail
    restart: unless-stopped
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/volumes/jenkins-stack_jenkins_home/_data/workspace/hanok/infra/promtail.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    networks:
      - hanok-network

  # =============================================
  # InfluxDB (k6 결과 저장)
  # =============================================
  influxdb:
    image: influxdb:1.8
    container_name: hanok-influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      INFLUXDB_DB: k6
    volumes:
      - influxdb-data:/var/lib/influxdb
    networks:
      - hanok-network

# =============================================
# Volume
# =============================================
volumes:
  mysql-data:
  redis-data:
  prometheus-data:
  grafana-data:
  influxdb-data:
  loki-data:

# =============================================
# Network
# =============================================
networks:
  hanok-network:
    driver: bridge