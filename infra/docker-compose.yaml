services:
  # =============================================
  # MySQL
  # =============================================
  mysql:
    image: mysql:8.0.45
    container_name: hanok-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      TZ: Asia/Seoul
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - hanok-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =============================================
  # Redis
  # =============================================
  redis:
    image: redis:7-alpine
    container_name: hanok-redis
    restart: unless-stopped
    command: redis-server --notify-keyspace-events Ex
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - hanok-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =============================================
  # Backend (dev)
  # =============================================
  backend-dev:
    image: hanok-backend:dev
    container_name: hanok-backend-dev
    restart: unless-stopped
    ports:
      - "8081:8080"
    networks:
      - hanok-network
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_HOST: hanok-mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION}
      PORTONE_BASE_URL: ${PORTONE_BASE_URL}
      PORTONE_STORE_ID: ${PORTONE_STORE_ID}
      PORTONE_SECRET_KEY: ${PORTONE_SECRET_KEY}
      PORTONE_SECRET_WEBHOOK: ${PORTONE_SECRET_WEBHOOK}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      REDIS_HOST: redis
      REDIS_PORT: 6379

  # =============================================
  # Backend (prod)
  # =============================================
  backend-prod:
    image: hanok-backend:prod
    container_name: hanok-backend-prod
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - /var/lib/docker/volumes/jenkins-stack_jenkins_home/_data/env/gcs-key.json:/app/gcs-key.json
    networks:
      - hanok-network
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: hanok-mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION}
      PORTONE_BASE_URL: ${PORTONE_BASE_URL}
      PORTONE_STORE_ID: ${PORTONE_STORE_ID}
      PORTONE_SECRET_KEY: ${PORTONE_SECRET_KEY}
      PORTONE_SECRET_WEBHOOK: ${PORTONE_SECRET_WEBHOOK}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      GCS_CREDENTIALS_PATH: ${GCS_CREDENTIALS_PATH}
      GOOGLE_APPLICATION_CREDENTIALS: /app/gcs-key.json

  # =============================================
  # LiveKit
  # =============================================

  livekit:
    image: livekit/livekit-server:latest
    container_name: hanok-livekit
    restart: unless-stopped
    ports:
      - "7880:7880"
    volumes:
      - ./livekit.yaml:/livekit.yaml
    command: --config /livekit.yaml
    networks:
      - hanok-network

# =============================================
# Volume (데이터 영속성)
# =============================================
volumes:
  mysql-data:
  redis-data:

# =============================================
# Network
# =============================================
networks:
  hanok-network:
    driver: bridge