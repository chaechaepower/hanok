stages:
  - test
  - build
  - deploy

variables:
  # 이미지 이름
  IMAGE_NAME: hanok-backend
  # docker-compose 파일 경로 (EC2 서버 기준)
  COMPOSE_FILE: /home/gitlab-runner/app/infra/docker-compose.yml
  # .env 파일들이 있는 경로 (EC2 서버 기준)
  ENV_ROOT: /home/gitlab-runner/app/infra
  # 네트워크 이름
  NETWORK_NAME: hanok-network

# ==================================================
# 1. Test 단계 (GitLab 공유 Runner 사용 - EC2 없어도 동작)
# ==================================================
test:
  stage: test
  image: eclipse-temurin:21-jdk-alpine
  only:
    - master
    - dev
  script:
    - cd be
    - chmod +x gradlew
    - ./gradlew test --no-daemon
  cache:
    key: gradle-cache
    paths:
      - be/.gradle
      - be/build/libs

